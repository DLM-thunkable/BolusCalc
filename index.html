<!DOCTYPE html>
<html>
  <head>
  <style>body {font-family: Arial, Helvetica, sans-serif; font-size:small;} table, td, caption {border:1px solid black; page-break-after:avoid;} td {text-align:center;} caption {padding-top:5px; padding-bottom:5px;} div {page-break-after:always;}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Include the Thunkable Web Viewer Extension -->
     <script src="https://thunkable.github.io/webviewer-extension/thunkableWebviewerExtension.js" type="text/javascript"></script>
    <title>Thunkable Web Bridge Demo</title>
  </head>
  <body>
    <!-- Optional: Display received messages -->
    <span id="messageDisplay">If this message persists, then your device's browser cannot display the HTML code. You can still create a PDF file by clicking the <em>Make PDF</em> icon below.</span>
  </body>
  <script type="text/javascript">ThunkableWebviewerExtension.receiveMessage(function(htmlpdf) {
document.getElementById('messageDisplay').innerHTML = htmlpdf;
    });
  </script>
</html>
